front:
  text: 序醫雖小道天下蒼生性命所繫固已非末藝之可以比也故能原於醫經經方之旨精究其術而博施濟衆始可稱醫也近年腳氣之證最多各家方論撰述浩繁日競新月爭奇以唱一家之說或背經訓而好自用或泥故常而不知變通如此而任人之生死譬猶工之不費鍛鍊農之不務耕耨而求其利希其秋腳氣之治嗚呼亦難矣哉夫腳氣之為病風會遷變時有不同近年嬰斯疾者益多致橫夭者亦為鮮恭惟朝廷至仁涵育群生痌瘝一體以周救元元為念於明治十一年六月創立腳氣病院以救民瘼於是余輩深體聖意謹奉官准與高島祜啓久也下條貞固通春淺田子誠惟斆松山資剛挺等及有志諸子相議以其八月開病院於本兩替坊名曰博濟堂推栗園淺田翁為院長其年所療殆數百名危候險證頗多而上鬼籙者僅百分之二又足以見多年曆驗之實效矣栗園翁尤為與有力焉因輯其方論里為一編顏曰博濟堂腳氣概論考證精核該括古今折衷群言探源窮委挈綱提要辨別陰陽較量風土證分乾溼治殊緩急旁及婦人並艾灼攝養之法收採無遺苟熟讀斯書施之於實際得通變活潑之妙則於腳氣之治法無復余蘊豈唯為此院之模範耶庶幾沐浴昭代深仁懿澤萬一涓涘有補乎川嶽亦竊所為幸也因今活字印刷以貽同志欲表博施濟衆之意余輩淺學孤陋濫竽衛生之家而負專任之責不能肯辭遂忘駑鈍記顛末以為序明治十二年五月岡田昌春柔克清川玄道念祖謹撰凡例一此書顓要知院中諸子治腳氣之軌範故揭證候簡明治法襯切而已若夫證候明備治法區別則詳於千金外臺聖惠聖濟及本邦醫心方萬安方等書宜就而參考一腳氣治方仲景以降歷代諸法及本邦所傳亦頗多然地異風殊時移物換自不能無損益今特採切於施用者是所以名概論也一腳氣證候多端鮮有能分析之者今提其要領分為九道以論說治法附之以便覽觀一腳氣有並傷寒者有並瘧痢者有並停飲蛔蟲者有並黴毒疥癬者有大病産後並之者宜審其本證先治其急者而已其稍涉輕緩可以從容調理者非此篇所關故置不録一每方出典多隨見採摘未遑一一尋究恐未免差錯且如本邦諸方悉出於先哲實驗而載籍未備姑以本朝經驗四字標之一證有遲速重輕藥有多寡緩急務在臨時斟酌故方劑藥量亦適其宜而不可執滯此篇所以分兩升合略之而不録也用者當視病輕重察藥緊慢酌古准今以裁之一如紫雪黑錫丹控涎丹靈砂丹之類諸病通用套法故不具録一腳氣之外治有針灸泄洗砭刺諸數方然泄洗及尉注等間有為大害者而如針灸則在初起與少瘥後最效矣故今揭其大法耳一腳氣證最要嚴禁忌慎攝養若犯之則雖處方適宜不能獲效此宜懇諭而深戒一此病老人小兒少患者間有之不如少壯急劇之證故治法不別舉若夫婦人自有與男子異治者因附録之以俟臨證者酌其人之稟賦病之主客而變通焉
