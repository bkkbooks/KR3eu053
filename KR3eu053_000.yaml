body:
  text: 腳氣概論腳氣統論論腳氣異名千金方曰黃帝云緩風濕痹是也外臺引蘇長史論曰晉宋以前名為緩風古來無腳氣名後以病從腳起初發因腫滿故名腳氣也醫說曰腳氣古謂之緩風又謂之厥者是古今之異名也楊大受曰古無腳氣內經名厥兩漢名緩風宋齊謂腳氣張景嶽曰腳氣之說古所無也自晉蘇敬始有此名然其腫痛麻頑即經之所謂痹也其縱衍緩不收即經所謂痿也其甚而上衝即經之所謂厥也論腳氣即古腫疾毛詩小雅巧言篇云既微且腫鄭玄箋云此人居下濕之地故生微腫之病人憎惡之故言女勇伊何何所能也是也論腳氣即古重膇左傳韓獻子曰郇瑕氏土薄水淺其惡易覯易覯則民愁民愁則墊隘於是乎有沉溺重膇之病不如新田土厚水深居之不疾有汾澮以流其惡通鑑陸遜上疏云郁霧冥其上鹹水蒸其下善生流腫轉相汙染胡三省注曰流腫者謂毒氣下流足為之腫古人謂之重膇今人謂之腳氣論腳氣即古呰窳史記曰楚越之地烹海為鹽飰稻羹魚地勢饒食不待賈而足以故呰窳注呰弱也窳病也羸弱而足病也枚乘七發云手足隋窳季善注曰窳弱也千金云此病發初得先從腳起因即脛腫時人號為腳氣深師云腳弱者即其義也按腳弱始見名醫別録及通鑑晉安帝義熙六年條而腳氣名亦見梁武帝書則其來尚矣論腳氣即素靈痿厥生氣通天論云秋傷於濕上逆而咳發為痿厥王冰注云陰陽應象大論曰地之濕氣感則害皮肉筋脈故濕氣之資發為痿厥厥謂逆氣也異法方宜論云中央者其地平以濕天地所以生萬物也衆其民食雜而不勞故其病多痿厥寒熱王冰注云濕氣在下故多病痿弱氣逆及寒熱也按素靈稱痿厥者皆當作蹶後世所謂腳氣是也王冰注曰厥論云厥謂氣逆上也世謬傳為腳氣廣飾方論焉後人皆主王說但林億千金方凡例云古以蹶為腳氣雞峰方云夫中央者其地平以濕法土德之用而生物也衆故中國之人食雜而不勞是以多痿厥今考素問五藏生成論血凝於足者為厥及痿厥之厥皆蹶字之義竟與厥論所說之厥不同說文蹶僵也呂氏春秋盡數篇處足則為痿為蹶本生篇招蹶之機重己篇多陰則蹶多陽則痿此後世所稱腳氣而高誘注以逆寒寒疾釋之是以厥解蹶謬也按靈樞陰陽二十五人篇云痿厥足痹亦同義醫學綱目云腳氣頑痹厥痛為痹厥足痿軟不收為痿厥腳氣衝心為厥逆恐泥矣論腳氣天下遍有千金云近來中國士大夫雖不涉江表亦有居然而患之者良由今代天下風氣混同物類齊等所致之耳外臺蘇長史論云近入京以來見在室女及婦人或少年學士得此病者皆以不在江嶺庸醫不識以為他病皆錯療之多有死者風氣毒行天下遍有非獨嶺間也論漢土腳氣古今異治劉茝庭曰唐以上所謂腳氣即今之腳氣而宋以降所謂腳氣蓋不過尋常腳痹腳痛等而所為腳氣殆非今之腳氣豈風會變遷時有不同乎又曰焉知後來腳氣更非今日之腳氣醫者宜同時措施已按本邦腳氣病始見於日本後紀大同三年藤原緒嗣辭職表而天元中丹波康賴著醫心方立腳氣一門鑿鑿論此病降至嘉元之間梶原性全著萬安方亦載其治方百餘首則知我邦千年以來已有斯病也厥後四海鼎沸干戈相接此病寥寥莫聞逮近世再盛其症候與晉唐所論同轍是亦風會變遷時有不同也論本邦腳氣古今異證香川景與曰腳氣之證漢唐錯家所論腳弱腫滿氣急衝心及不仁麻痹等之症吾邦振古以來曾無之但有腳氣痹痛之症耳故不別立一門而附諸痛痹先人已故自寶曆年間始有斯病其證候全若漢唐諸家所論然多發於夏秋之間春冬稀有之多在男子壯年之人在弱齡之人及婦人者甚鮮矣爾來此病盛行死者亦不少矣蓋此病雖自足發而病根在腹故心下解豁者縱令諸症重者多易愈心下硬緊則難治可觀其根在腹也又有蓄瘀血瘀汁之人兼時氣而發者也恰如疥癬用速愈法而內攻毒氣入腹水脹氣急者故欲治此症者不問足須問腹如何雖腫消麻解而腹裡病不除必再發可不慎哉論腳氣由風毒千金云夫風毒之氣皆起於地地之寒暑風濕皆作蒸氣足常履之所以風毒之中人也必先中腳久而不瘥遍及四肢腹背頭項也劉茝庭曰今推真人意蓋寒暑風濕鬱蒸傷人皆名風毒非別有風毒者論腳氣因飲氣下流外臺許仁則曰腳氣有數種有飲氣下流以成腳氣飲氣即水氣之漸亦有腎氣先虛暑月承熱以冷水洗腳濕氣不散亦成腳氣李東垣曰夫乳酩醇酒者濕熱之物飲之屬也加以奉養太過亦滋其濕水性潤下氣不能詬故下注於足脛積久而成腫滿疼痛此飲食下流之所致也論腳氣由腎虛外臺蘇長史論云腳氣之為病本由腎虛多中肥溢肌膚者無問男女若瘦而勞苦肌膚薄實皮膚厚緊者縱患亦無死憂濟生方云觀夫腳氣皆由腎虛而生然婦人亦有病腳氣者必因血海虛乘宿塊嗔恚哀戚悲傷遂成斯病兼令婦人病此者衆也知婦人血海虛而得之與男子腎虛類矣治婦人之法與男子用藥固無異但兼以治憂恚藥無不效也論腳氣有內外景嶽全書云腳氣之因有二一則自外而感一則自內而致也自外而感者以陰寒水濕雨霧之氣或坐臥濕地致令濕邪襲人皮肉筋脈而凡清濕襲虛則病始於下致為腿足之病此外因也自內而致者以肥甘過度酒醴無節或多食乳酪濕熱等物致令熱壅下焦走注足脛面目漸腫痛或上連手節者此內因也然在古人謂南方卑濕病多外因北方嗜酒酪病多內因此固一說然北方亦有寒濕南方豈少酒濕此固不必分南北按此說本出李杲醫學發明醫學正傳醫燈續焰亦有說可參考焉論腳氣有乾溼千金云腳氣不得一面以腫為候亦有腫者有不腫者其小腹頑痹不仁者腳多不腫小腹頑痹後不過三五日即令人嘔者名腳氣入心如此者死在旦夕外臺許仁則曰有乾溼二腳氣濕者腳腫乾者腳不腫漸覺枯燥皮膚甲錯聖濟云腳氣有乾溼之異者蓋陰陽所自分也在藏為陰在府為陽然皆由風濕毒氣乘虛而入其證大同小異故乾腳氣之狀血脈否澀皮膚𤸷痹脛細痠疼食減體瘦藏府祕滯上衝煩悶濕腳氣之狀腳先腫滿或下注生瘡肌汁流下兩腳熱疼上攻心腹咳嗽喘急面浮膝腫見食嘔吐馮魯瞻曰凡腫者名濕腳氣者筋脈弛長而軟或浮腫是也治宜利濕疏風如不腫者名乾腳氣者干即熱也筋脈踡縮攣痛枯細而不腫者是也治宜潤血清燥有從外感者有從內傷者其為濕熱則一而已林氏活人編云腳氣治法乾腳氣初則疏散中則和解末則潤下濕腳氣初亦疏散中亦和解未則宜乎清補婦人腳氣亦有乾溼之別顧氏曰今揚地俗呼亦有公母之稱公腳氣其痛也腫而色白治之縱愈不能望其生育因其血氣大虧經必過期而至慳澀無多母腳氣其痛也腫而色紅其熱如烙經多先期而至治之如法尚可望其生育論腳氣脈異他病腳氣之脈大抵浮弦起於風濡弱起於濕洪數起於熱遲澀起於寒沉而伏為毒在筋骨指下澀澀不調為毒在血分而又有一種可惡之脈巢源云病人脈浮大而緊駃此是三品之中最惡脈也或沉細而駃者此脈正與浮大緊者同是惡脈浮大者病在外沉細者病在內治亦不異當消息以意耳其形或尚可而手腳未及至弱數日之內上氣即死小品云脈浮大者病在表沉細者病在裡脈浮大緊駃者三品之中最惡脈也按駃脈腳氣之外鮮觀而嬰兒或傷寒問有之傷寒總病論云脈朝夕駃者實癖也可下之朝平夕駃者非癖也不可下駃謂數脈六七至者也幼幼新書引嬰童寶鑑云兒三歲至七歲其脈駃一息七八至為平蓋嬰兒性聲高脈急固非大人之比而腳氣與傷寒邪勢猖獗不可摸捉故現此脈狀也論腳氣似傷寒郭雍曰傷寒頭疼身熱支節痛大便祕或嘔逆而腳屈弱者腳氣也傷寒只傳六經故症與腳氣相似然終不同者孫真人云卒起腳屈弱不能轉動者此為異耳其脈弦而浮者起於風濡而弱者起於濕洪而數者起於熱遲而澀者起於寒風者汗而愈濕者溫而愈熱者下而愈寒者尉而愈腳氣之病始得不覺由他病乃知毒氣入腹則少腹頑痹不仁令人嘔吐死在旦夕矣然腳氣之候必先從腳起或先緩弱疼痛寒勝為痛痹或行起忽倒或兩脛腫滿或不腫腳膝枯細或心中忪悸或少腹不仁病久入深營衛不榮故為不仁不仁者皮膚頑木不知是也或舉體轉筋或見食吐遂惡聞食氣或胸滿氣急或遍體痠疼皆腳氣候黃帝所謂緩風痹是也頑弱名緩風疼痛為濕風痹痹者閉也而不仁故名痹朱肱云頭疼身熱支節痛大便祕或嘔逆而腳屈弱者此名腳氣也傷寒只傳足經不傳手經地方寒暑風濕皆作蒸氣足當履之遂成腳氣所以病證與傷寒相近林氏活人編云腳氣與傷寒原屬二症難以溷淆只有寒熱嘔逆及三陰三陽傳變深淺與傷寒相似故曰類也若論致死之因凡風寒暑濕之邪無不由於經絡而傳於六腑以至五臟自輕至重自重至危何獨腳氣為然而必與傷寒並論哉按腳氣與他病相併者不止傷寒如痢後瘧後産後往往發之蓋五內未調氣血不健而成麻痹痿弱腳浮腫者宜審其似者與並者而為之處療矣董西園醫級云腳氣之候傷寒有傷之名謂其有寒熱巔疼之證也然實則本於濕因經言傷於濕者下先受之可見是證之要總以治濕為主但當分寒熱二者當以赤腫者為熱寒浮不赤為寒兩辨既明自無貽誤論腳氣衝心候聖濟云腳氣衝心之狀令人胸滿上氣喘急甚者嘔吐是也蓋風濕毒氣初從足起縱而不治至於入腹小腹𤸷痹不仁毒氣上衝是謂腎水尅心火故謂腳氣衝心孫思邈曰凡小覺病候有異即須大怖畏決意急治之不可概以腫為候亦有不腫者正謂此也按衝心之候正在膻中蓋其毒潛匿心胸阻閡血隧則血往而無所還逆行而逼心當此際動悸築築然見於膻中譬猶奔泉之激石洪流之觸洲水怒浪翻所以毒之衝心胸可徵矣又當其初起有忽然見動悸者是尤惡候其禍不可測又雖有短氣嘔吐心胸煩悶等惡候悉備然膻中無動者必無衝心之虞矣論腳氣壅疾外臺云夫腳氣者壅疾也消渴者宣疾也春夏陽氣上故壅疾發即宣疾愈也秋冬陽氣下故宣疾發壅疾愈也審此二者疾可理也楊氏曰腳氣是為壅疾治當以宣通之劑使氣不能成壅也若壅既成而盛者砭惡血以消腫熱砭之後以藥治之論腳氣色診橘元周曰夫平人縱理致密色黑有光如脹不脹循之不留皮膚滑堅時緩時急其色亦不同帶黑則毒盛見白則毒緩常或頭痛或齒根痛或目赤耳聾時見衄血腹裡拘攣腰腳軟痛且其人多性急過思慮又灸瘡不發乾枯落痂者皆腳氣也神機精微以言不可盡明者其深察焉又曰古來諸書皆以風寒暑濕外來客邪立論故謂肥白肉軟難已瘦黑肉硬易治也今豫說郁毒果在內非由外譬猶痘瘡本胎毒因有時氣所觸而發腳氣亦本郁毒因有時氣所觸而發痘瘡為膿疱靨痂故不復發如腳氣無膿疱故雖得瘥者或至一二年復更發動也視有其時氣所觸而以為風寒暑濕即病腳氣者因循舊貫無如之何耳夫肥白肉軟者毒輕其治早則易治瘦黑肉硬者毒盛其治晚則難愈何必以黑白瘦肥為易難哉豫經試多有因郁毒而見皮膚黑脹者唯是以毒之輕重決吉凶不強拘肥白瘦黑也今驗之病者是說大信論腳氣外發諸法凡腳氣得之於侵雨涉水或坐臥濕地或勞動中風或飢飽不時若大兵之後若凶慊之時者皆系外因宜發泄表氣運輸水血之劑若雖屬於內因者苟有表證宜效此法聖惠云縱甚羸亦須微微通泄亦宜時取汗是也論腳氣內疏急治諸法腳氣不內外二因凡有里症者宜疏氣利水若緩忽失治勢必衝突至攻心故少覺心下痞悶動氣在胸腹則宜瓜茱檳朴之類若至煩悶嘔吐上氣衝心則非金石鎮墜之品則不能救所以有急治之設也論腳氣內疏緩治諸法腳氣之疾古人以急治為要然其證緩者方劑亦不無斟酌所以有內疏緩治之法也論腳氣滲利滌瀉諸法腳氣固忌大泄大補然水毒劇甚有滔天之勢者非峻瀉則不能救一時之急況其滲尿疏泄之劑在所專用乎論腳氣滋養諸法腳氣固忌補古人有警戒然其人精氣虛麻痹痿弱不振者非滋補劑不能起之濟生方云入冬已後須量人之盛衰微加滋補不然則氣血日衰必使年年遇蒸熱而作理之必然也論腳氣灸法孫思邈王燾專用灸炳蓋取之於溫導經脈宣通壅塞如𤸷痹麻木痿躄緩縱拘急轉筋者宜灸其腰腳凡灸而不覺熱者其毒深也灸至覺熱為佳凡灸炳加多無妨待身體輕捷然後可休矣千金云若欲使人不成病者初覺即灸所覺處二三十壯因此即愈不復發也又云毒氣外滿則灸漏其氣內滿則藥驅之蘇恭曰凡腳氣內須服藥攻擊外須膏摩火灸發泄等並是腳氣之要又云凡人雖不患腳氣但苦腳膝疼悶灸此無不應手即愈極為要穴又云腳氣初發轉筋者灸承山承筋二穴或云承山穴凡宜腳氣其效勝於八處穴外臺側子酒條云須隨病內外灸三兩處以泄氣徐王曰比見毒氣攻處疼痛如刺隨病即灸火徹便瘳不拘上下凡毒氣所沖如賊欲出得穴即出豈在大門也唐論云凡灸不廢湯藥藥攻其內灸泄其外譬如開門驅賊賊則易出若閉戶逐之賊無出路當反害人耳丹溪心法云外以附子末津唾調敷湧泉穴以艾灸之引熱下行一閒齊云腳氣初得腳弱痹疼速可灸並服越婢湯惟急速治之病輕者則愈灸壯不多者惟差復更發或以年月日時發動者至氣急殺人慎之論腳氣攝養法外臺云不得露足當風入水以冷水洗腳雖夏月常須著綿裩至冬寒倍令兩脛溫暖得微汗為佳常令按摩數勞動關節令氣血通暢此養生之要拒風濕之法也養老新書云湧泉穴在足心濕氣皆從此入日夕之間常以兩足赤肉更次用一手握指一手摩擦數百多時覺足心熱即將腳指略略動轉倦則少歇或令人擦之亦得終不若自擦為佳腳力強健無痿弱痠痛之疾矣東垣曰凡飲食之後宜緩行二三百步疲倦即止如此則不能成壅也腳氣所因有濕邪中足壅塞經脈而致者有腎氣不足飲水失道而致者有高粱過度脾胃濕鬱而致者故預防之法忌久坐陰濕地或著滋濕衣或冒霧而行或步久雨乍晴地氣蒸過之處忌食魚鳥餅粢一切厚味忌大酒及醉睡忌欲事達度及醉後入房忌久坐久立及行步勞動俱失其節慎茲五者則不止腳氣而諸病不生誠久視之良訣也櫟蔭遺說腳氣痹攣腳氣痹攣者濕邪著筋脈也濕邪著筋脈則攣痹不能轉移艱於步履不可屈伸是為腳氣初起之候也千金越婢加朮湯治肉極熱則身體津脫腠理開大汗泄厲風氣下焦腳氣即金匱越婢湯加朮按松原閒齊曰初起膝脛不仁痹不能行腳弱歷節疼痛或不能屈伸者宜此方聖濟越婢湯治風毒腳氣痹攣行步不遂即金匱越婢湯加朮附子按張路玉曰風毒腳氣濕壅最甚非藉附子之大力無以開之今以朮附匯入越婢湯中即是近效白朮附子而兼越婢之制得此金錍何憚堅壘不克同風引湯治腳氣痹攣風毒攻注腳疼痛獨活防風當歸茯苓大豆人參乾薑附子石斛上九味按張路玉曰風引末疾而四肢引動也故立方專以朮附為主而兼麻黃越婢麻附細辛麻杏石甘苓桂術甘甘姜苓朮等之制其金匱六石風引湯千金更名紫石散列之腸腑風癲門中與此風馬牛不相涉也蓋金匱風引湯治腳氣陳念祖悉之說具於後同防己湯治腳氣攣痹或四肢攣腫不可屈伸防己桂麻黃茯苓桑根白皮芍藥甘草上七味聖惠檳榔散治腳氣春夏防發宜此疏風調氣檳榔獨活茯苓枳殼羚羊角沉香大黃芎藭甘草生薑上十味千金風緩湯治腳氣舉體痹不仁熱毒氣入臟胸中滿塞不通食即嘔吐獨活麻黃犀角半夏大棗烏梅桂枝鱉甲升麻橘皮枳實甘草吳茱萸大黃生薑石膏貝齒上十七味按此亦大鱉甲湯類方腳氣用鱉甲後人不詳其義治療雜話云瘧及腳氣之痞非鱉甲則不能奏效永田德本曰腳氣之治不在腳而在腹此所以用檳榔鱉甲也同石膏湯治腳氣風毒熱氣上衝頭面面赤矜急鼻塞去來來時使人昏憒心胸恍惚或苦驚悸身體戰掉手足緩縱或酸痹頭目眩重眼反鼻辛熱氣出口中或患味甜諸惡不可名狀者石膏龍膽升麻芍藥貝齒甘草鱉甲黃芩羚羊角橘皮當歸上十一味聖濟小鱉甲湯治身體微腫心胸痞滿壯熱小腹重兩腳痹弱鱉甲升麻黃芩麻黃羚羊角前胡烏梅杏仁桂上九味按此方比風緩湯甚簡易用宜斟酌增損而用之三因六物附子湯治寒濕腳氣痠痛不仁兩尺脈來沉細者此痹症也此方主之附子桂枝白朮甘草防己茯苓上六味按仲景甘草附子湯千金名四物附子湯云體腫者加防己四兩悸氣小便不利加茯苓三兩陳氏據之合為一方也本朝經驗桂枝加朮苓附湯治腳弱緩風即桂枝湯加朮茯苓附子腳氣腳膝腫痛腳膝腫痛者風寒濕氣客於經絡氣血不能宣通則壅滯為腫凝塞為痛也蓋邪氣初中但在於下而未及乎上所謂傷於濕者下先受之也疏導其下固護其中法斯善矣聖濟防風湯治風毒腳氣無力𤸷痹疼痛四肢不仁失音不語及風毒衝心防風大棗桂麻黃當歸檳榔犀角茯苓上八味千金犀角麻黃湯專治腳氣屬實熱者犀角麻黃防風獨活防己芎藭白朮羚羊角當歸黃芩石膏生薑甘草杏仁桂心上十五味一方有茯苓附子細辛無獨活羚羊角杏仁按此方諸書載在衝心門然專治腳氣風毒腫痛屬實熱者效本邦老醫傳云治腳氣腫脈數小便赤澀毒氣犯血而發熱者得之直指追風毒銼散治腳氣熱多證疏泄風毒羌活檳榔防風桑白皮郁李仁大黃上六味黑豆百粒煎服按犀角麻黃湯證而屬裡實者宜此方其效優於羌活導滯湯寶鑑當歸拈痛湯治濕熱為病肢體煩疼肩背沉重胸膈不利下注於脛腫痛不可忍羌活茵陳黃芩甘草知母澤瀉茯苓豬苓白朮防風人參苦參升麻乾葛當歸蒼朮吾門常去白朮人參不用上銼作一貼水二盞浸藥少時煎至一盞空心臨臥各一服一相公領兵至南方忽得腳氣遍身微腫其痛手不可近足脛尤甚內經云飲發於中胕腫於下又云諸痛為實血實宜決之以三稜針數刺其腫上血突出高二尺余漸漸如線其色黑紫頃時腫消痛減以當歸拈痛湯服之是夜得睡明旦再服而愈又云廉平章體肥得腳氣微腫皆赤色足脛腫痛不可忍手不敢近投以當歸拈痛湯一貼其痛減半再服腫痛悉除醫方大成檳蘇散治風濕腳氣痛疏通氣道即和劑局方香蘇散加檳榔木瓜簡易普濟神效檳蘇散治腳氣如神檳榔蘇葉梗防風羌活當歸木瓜乳香沒藥上薑蔥水酒煎入片糖一指大溶化熱服酒隨量飲為度綿被蓋腳痛待藥力尋到痛處汗出避風以有汗為愈道按麻痹腨脹痛不可忍者屢用屢效婦人更效楊氏趁痛散治濕攻注腰腳疼痛行步少力沒藥杜仲延胡索當歸肉桂萆薢上六味為末同攢風散專治寒濕腳氣先用此發散麻黃甘草淮烏萆薢杏仁上五味新效方防己飲治風毒腳氣防己蒼朮黃柏生地黃川芎木通白朮甘草檳榔黃連犀角上十一味按丹溪心法防己飲亦同之壽世保元云治腳氣憎寒壯熱者此濕熱在足也醫學從衆雞鳴散治腳氣第一品藥不問男女可服如感風濕流注腳痛不可忍筋脈腫者並宜服之加鹿茸者其效如神時方歌括云其服於雞鳴時奈何一取其腹空則藥力專行一取其陽盛則陽藥得氣也其必冷服奈何以濕為陰邪冷汁亦為陰屬以陰從陰混為一家先誘而後攻之也即外臺唐侍中一方加桔梗拔粹方除濕丹治諸濕客傳腰膝重痛足脛浮腫檳榔甘遂威靈仙芍藥葶藶乳香沒藥牽牛子大戟陳皮上十味糊丸金匱翼加味二妙丸治兩腳濕痹疼痛或如火燎從足胕熱起漸至腰胯或麻痹痿軟皆是濕熱為病此藥主之蒼朮四兩黃柏二兩川牛膝一兩防己當歸尾川萆薢龜版各一兩上為細末酒煮麵極熟糊丸如梧子大每一百丸空心姜鹽湯下腳氣腫滿腳氣腫滿漸成水狀者濕邪壅塞氣血水氣散溢滲於皮膚流遍四肢也蓋水濕二氣內外合邪積而成滿閉而成脹則忽有衝心之虞不可緩也聖惠漢防己散腳氣通身浮腫小便不利氣壅煩悶脅連膀胱虛脹上氣喘促坐臥不得漢防己桑根白皮澤瀉茯苓木通郁李仁豬苓檳榔紫蘇莖葉生薑上十味拔粹方桑白皮散治腳氣盛發兩腳浮腫小便赤澀腹脅脹滿氣急坐臥不得桑白皮郁李仁茯苓木香防己大腹子紫蘇子木通檳榔青皮上十味按活人書云治腳氣浮腫尿澀氣急腹滿驪家醫言云治婦人腳氣外臺黑豆湯療腳氣遍身腫黑豆桑根白皮檳榔茯苓上四味同黑豆一合半以水一升煮取六合煮三味取三合為一劑分三服按聖濟去茯苓加郁李仁生薑名黑豆飲治一切風毒腳氣軟弱等今本方加郁李仁治腳氣周身洪腫欲衝心者效聖濟赤小豆湯治腳氣氣急大小便澀通身腫兩腳氣脹變成水者赤小豆桑根白皮紫蘇莖葉上三味除小豆外為末每服先以豆一合用水五盞煮熟去豆取汁二盞半入藥末四錢生薑一分碎煎至一盞半溫服同柴胡豬苓湯治腳氣緩弱及痹腫滿心下急大便澀柴胡豬苓紫蘇葉陳橘皮防己大麻子郁李仁桑根白皮上八味按雞峰柴胡湯治風寒濕毒腳氣痛皮膚不仁緩弱𤸷痹足脛腫滿心下急大便澀即本此活人編三陰腳氣主方薏苡仁茯苓防風羌活澤瀉防己大腹皮生薑上八味按本書云邪在三陰誤用重濁之藥則傷元氣上方輕清利導化濕清熱之平劑也本朝經驗九味檳榔湯經驗筆記治腳氣腫滿短氣檳榔大黃厚朴桂枝甘草木香橘皮紫蘇葉生薑上九味按此方無厚朴木香蘇葉有枳實名七味檳榔湯治腳氣氣血凝滯者其原出於千金云今本方去大黃加吳茱萸茯苓每用得效本朝經驗石膏湯山本氏一名雙解散治腳氣腫滿氣急即越婢湯與唐侍中一方兩合按今用此方加茯苓術更效同禹水湯聿修堂治腳氣腫滿胕腫者赤小豆草五錢檳榔十五錢豬苓草錢澤瀉十五錢麥芽草五錢神面十錢木瓜十錢木通十錢上同炒焦水煎溫服一方加黑炒赤龍皮效甚速同桑白皮飲盤瀨氏腳氣論桑白皮沉香防己木通厚朴茯苓檳榔子郁李仁紫蘇子犀角生薑上十一味按此方系拔粹桑白皮散變制而降氣之力特緊故有折衝之效矣外臺桃花散療腳氣及腰腎膀胱宿水按本草綱目云痰飲宿水桃花散收桃花陰乾為末溫酒服一合取利覺虛食少粥不似轉下藥也腳氣大小便不通腳氣大小便不通者由風濕之氣搏於腳膝上攻胸腹脅肋填滿榮衛否隔三焦之氣升而不降所以傳導變化皆不能出而大小便不通也千金月令主腳氣大便澀方大黃五兩大麻仁二兩上二味先將大黃搗羅為末入麻子仁研勻鍊蜜丸同茱萸散主腳氣心悶不通及乾霍亂等鍊成朴硝一斤茱萸末八兩上相和服一匙聖惠升麻散治𤸷毒腳氣發動心胸躁熱悶亂氣急口乾舌燋煩渴大小腸不利升麻黃芩茯苓木香犀角屑朴硝麥門冬甘草上八味同麥門冬散治腳氣大小便祕澀發熱煩渴口乾心躁麥門冬茯苓木通大黃黃芩朴硝枳殼桑白皮紫蘇上九味同治腳氣發動大小便祕澀肢節煩疼頭目旋暈氣壅昏沉不欲飲食宜服此方大黃枳殼旋覆花芍藥木通紫蘇犀角朴硝黃芩上九味究原方三脘散治腳氣發腫大便澀氣滿加大黃煎服即三和散直指三和散加木香枳殼永類鈐方三和散加減沉香木香羌活芍藥檳榔甘草撫芎青皮枳殼紫蘇葉並子木瓜上十一味按淡寮方無方名云治腳氣便祕或入腹衝心疼痛腫滿等證得效三將軍圓治腳氣入腹衝心大便不通吳茱萸木瓜大黃各等分上為末米糊丸如緑豆大每服五十丸粳米枳殼湯下同木通散治腳氣服熱藥太過小便不通淋閉臍下脹當歸梔子仁赤芍藥赤茯苓甘草上五味金匱翼木香湯青木香生黑豆皮大黃紫雪上水煎五錢入紫雪三錢分二服頓再服當下燥糞腳氣小腹不仁腳氣濕淫之邪自下侵上下元氣弱不能御之則漸入小腹而痹著不仁至其最甚者胸腹麻痹遂及於兩手口吻失知覺矣蓋此症有二道一為八味丸一為三脘湯加薏苡仁也金匱八味丸乾地黃山茱萸薯蕷茯苓澤瀉牡丹皮附子肉桂上八味濟生加味腎氣丸治臂氣腰重腳腫小便不利即金匱八味丸如車前子川牛膝三脘湯加薏苡仁治腳氣小腹不仁屬疝者得效方云腳氣稍愈常服三脘散弱人更宜朮附湯三因吳萸丸治腳氣入腹腹中不仁喘急欲死吳茱萸湯洗七次木瓜去穰切片日乾等分上為末酒糊丸梧子大每服五十丸至百丸酒飲任下或以木瓜蒸爛研膏為丸尤妙腳氣上氣腳氣上氣者風毒濕氣循經上入於肺故也肺主氣而司呼吸邪氣入之則氣道奔迫升降不順故令上氣喘滿甚不得偃臥也千金紫蘇子湯三因紫蘇子湯治腳弱上氣陰陽交錯清濁不分上重下虛中滿喘急嘔吐自汗無復紀律即千金紫蘇子湯聖惠治濕腳氣上攻心胸喘促悶絶宜此方檳榔吳茱萸上二味家寶四磨湯治氣滯攻衝心腹㽲痛張景嶽曰腳氣上衝心腹喘急不得眠臥者宜此方沉香木香檳榔烏藥上濃磨水煎服濟生有人參無木香名四磨湯治七情傷感上氣喘急妨悶不食局方黑錫丹徐靈胎曰黑錫丹鎮納元氣為治喘必備之藥當蓄在平時腳氣嘔逆腳氣風濕毒氣上入侵胃中則胃氣上逆故令心胸妨滿食飲不下而為嘔逆也嘔吐一證為腳氣衝心之漸最為可畏矣千金犀角旋覆花湯治腳氣腫滿或行起痿弱小便祕澀喘息氣衝食嘔不下旋覆花茯苓橘皮豆豉蘇葉犀角生薑大棗上八味或去豆豉按外臺崔氏去犀角名旋覆飲子聖惠旋覆花散治乾腳氣欲發噁心頭旋吐痰水不思飲食兩腳膝疼痛漸漸心悶旋覆花犀角屑大腹皮檳榔前胡茯苓半夏枳殼上八味入生薑薄荷水煎按此方系犀角旋覆花湯變制用者斟酌可適其宜直指木香飲治腳氣入腹攻心嘔木香甘草吳茱萸木瓜橘皮紫蘇檳榔上七味傷寒論吳茱萸湯治腳氣攻心嘔吐甚者本朝經驗三靈湯治腳氣嘔吐兼蛔或諸藥不止者莎草紅花檳榔上三味局方靈砂丹治腳氣嘔吐水藥不入者靈砂上一味為丸棗湯服十粒日一夜一間有損口者勿治自然愈病急者為散以冷水下之金匱小半夏加茯苓湯治腳氣嘔吐甚諸藥不納者按外臺必效療腳氣方及文仲療腳氣入心悶絶欲死者方並用小半夏湯但以薑汁代生薑耳又直指方治諸水氣用小半夏加茯苓湯吾邦原南陽山田業廣亦善用小半夏加茯苓湯治腳氣險證其治驗載在醫事小言醫學管錐外篇宜就而看焉腳氣衝心腳氣衝心之候令人心胸煩悶嘔吐氣急喘渴人迎腫起巨里動如奔馬甚者脈絶不出欲死也蓋風濕毒氣初從足起閉塞血氣妨害筋脈忽上衝心胃之分最為危急下氣除濕泄毒不可緩也外臺唐侍中療苦腳氣攻心此方甚散腫氣極驗大檳榔生薑橘皮吳茱萸紫蘇木瓜上六味按萬安方引衛生良劑方名檳茱湯治風濕毒氣中於足脛遂為腳氣下注兩腳腫脹疼痛履地不得及內攻心腹手足脈絶悶亂煩喘氣不得息極有神效外臺犀角湯療腳氣冷毒悶心下痞堅背膊痛上氣欲死者吳茱萸檳榔青木香犀角半夏生薑上六味方後云破毒氣尤良原無方名千金茱萸湯治腳氣入腹困悶欲死腹脹吳茱萸木瓜上二味方後云此起死回生方按淡寮方加大黃為丸名三將軍丸千金半夏湯治腳氣上入腹腹急上衝胸氣急欲絶半夏桂心乾薑甘草人參細辛附子蜀椒上八味按劉桂山嘗用千金治痰飲半夏湯半夏生薑附子吳茱萸四味方以治腳氣衝心危症即此方之單捷者已按張路玉曰腳氣用補乃證治之變此以病久正氣傷憊濁邪元劇不得已而用四逆加人參湯更加半夏蜀椒桂心細辛專散入腹沖胸濁陰之氣為急若兼攻外毒則救里勢分不能克濟專功矣同主風毒腳氣多睡心驚悸石發攻心方麥門冬石膏茯苓人參淡竹葉生薑上六味道按蘇恭方無人參有小麥蘇恭犀角湯風熱輕但毒氣入胃唯心悶煩索水灑胸面乾嘔好叫喚欲斷絶者犀角羚羊角射干沉香青木香丁香石膏麥門冬竹茹麝香人參茯苓上十二味外臺紫雪療腳氣毒遍內外煩熱口中生瘡狂易叫走按活人書云大煩躁者紫雪最良醫心方鑑真曰若腳氣衝心取一小兩和水飲之良方木香散治婦人腳氣卒發衝心悶亂木香郁李仁赤芍藥大腹皮紫雪桑白皮桂心檳榔茯苓上九味聖惠治腳氣衝心煩悶氣喘坐臥不得方黑豆生薑杉木節沉香木瓜紫蘇莖葉檳榔童子小便上件藥細銼先炒黑豆及生薑令熟後入小便並諸藥聖濟沉香湯治腳氣衝心煩悶氣促腳膝痠疼沉香芍藥紫蘇莖葉木通檳榔吳茱萸生薑上七味入紅雪同赤茯苓湯治腳氣衝心煩悶膝痛赤茯苓石膏犀角屑升麻麥門冬木香上六味入竹瀝按金匱翼去升麻加枳殼沉香紫蘇梗葉檳榔防風名犀角散治腳氣衝心煩喘悶亂頭痛口乾坐臥不得同趁痛丸治腳氣上攻及風毒走注疼痛即控涎丹婦人良方治婦人腳氣衝心悶亂不識人方紫蘇松節吳茱萸檳榔木瓜橘皮上六味入童子小便局方養生丹按易簡方云腳氣之患入腹衝心或見嘔吐之症無法可療不瘥用養生丹黑錫丹來復丹之類更須多服以大便流利為度腳氣無補法此有利性即非補藥服之無疑痃癖疝氣膀胱奔豚之氣入腹者亦宜用此萬安方九味木香丸治腳氣衝心胸膈煩滿喘急嘔吐木香訶子皮桂心枳殼各二兩檳榔二兩半芍藥柴胡各一兩二分大黃三兩厚朴二兩半上細末蜜丸大小便祕結加牽牛子末二兩赤茯苓一兩二分尤神妙本朝經驗三鎮散治腳氣衝心犀角角石各二錢檳榔一錢上三味研末暖水送下同沉香豁胸湯治胸腹滿腫氣急息迫喘咳者沉香砂仁香附子甘草吳茱萸桑白皮犀角生薑上九味按局方沉香降氣湯云患腳氣人毒氣上衝心腹堅滿肢體浮腫者尤宜服之今用此方其效更優百百漢陰曰豁胸湯者和田東郭所名余屢試用比之於外臺大犀角湯其效差勝然原取之大犀角湯而其方單爾同大陷胸湯治胸腹水邪充實衝心苦悶者大承氣湯治腳氣上入腹滿不大便者或云腳氣素系飲食濁氣非此湯不能除之風引湯陳修園曰治腳氣入心仲景用腎氣丸通膀胱之氣安其腎氣不使攻心巢氏用風引湯取石性易於下達勝其濕熱不使攻心二方皆為救急之神劑一治腎氣之虛一治濕熱之盛宜憑症擇用之磠砂散治腳氣攻心難解者即一味水服按外臺張文仲硇砂牛膝三物散療腳氣上氣即用硇砂牛膝細辛各三兩為散酒和服又蘇恭腳氣散主腳弱上氣痹滿不食常服方即於三物散方中加丹參白朮郁李仁今單服其效更捷本朝經驗砂膽散硇砂一分熊膽一分上二味研合以單檳榔湯或沉香降氣湯送下或加鐵砂為湯用之可高島久也曰其人衝心唇色青黑者毒氣已深不治若唇口滋潤微赤者早用此方則可救矣腳氣痿弱腳氣濕邪侵經絡則筋弛縱而痠弱自膝至腳已有不仁或屈弱不能行其初有肉削筋急而發之者或有水氣去衝心差後發之者古謂之緩風濕痹腳氣成功概歸此一症八味丸料金匱云治腳氣上入小腹不仁醫通云三陰受寒濕著於腳膝上枯瘦色淡小腹不仁腹急痛疼上氣喘氣本方加沉香有持希藻曰每歲發者徐徐服之兼省膏粱得免後患局方大防風湯證治大還治痢後腳痛緩弱不能行步或腿膝腫痛有持希藻曰腳氣日久腳脛枯細或癢或軟嚲曳者及痢後風鶴膝風附骨疽一切腿膝腫毒潰爛膿水不絶其人虛羸者皆治之同思仙績斷丸治脾腎風虛毒氣流注腿膝痠疼艱於步履小便餘瀝大便後重防風川烏頭杜仲木瓜薏苡仁牛膝續斷萆薢上八味按本事方去川烏木瓜加五加皮羌活生薑本朝經驗健步丸天正記菊亭右相方鹿角十錢白朮防己各五錢蘗皮炒三錢上四味糊丸四物湯加牛膝木瓜醫學心悟云腳不離乎濕熱亦有兩足忽然枯細者俗名乾腳氣此為風燥之症四物加牛膝木瓜主之今帶腫氣者去牛膝加蒼朮薏苡仁更佳同桃核承氣湯大防風湯並治腳氣痿弱枳園方譜聖濟乳煎硫黃散治腳氣久虛緩弱黃牛乳三升硫黃一兩上二味先將牛乳煎令減半每服以乳五合入硫黃末二錢調和服之服畢宜厚以衣被覆臥取汗按牛乳治腳氣其來尚矣千金方云宜生牛乳生栗子千金翼主腳氣初發從足起至膝脛腫骨疼者方烏牛尿一服一升日二服腫消止羸瘦者二分尿一分牛乳合煮乳結乃服之是也又有用此方治腳氣衝心者詳見於時還讀我書清川道曰備後福山豪商家傳治腳氣衝心祕方即以烏牛尿一合點服硫黃末一錢蓋服烏犢牛尿方多見外臺必要名醫別録云牛溺治腳氣據之用牛尿亦可但有虛候者勿用附録論婦人腳氣婦人腳氣證聖惠及婦人良方詳論之而厥後寥寥罕見因謂腳氣病男子最多婦人特少者以婦人月事以時下濕邪無所凝滯也蓋近來婦人患之者間有之而至今茲戊寅余診療者頗多按顧世澄瘍醫大全江南揚州府江都甘泉儀徵三縣婦女腳氣始自康熙五十年間從前並無此證此乃得於陰陽錯謬之沴氣非上古男婦濕熱壅腫五痹之腳氣蓋此類也其感受也皆由於富貴之家情性驕傲稍不如意恚怒易生安享太過飲食無節傷飢失飽喜食生冷亦有女子婚姻愆期經事驟閉配非其偶抑鬱不舒肝氣凝結脾氣鬱泄是以肝脾兩傷肝血日虧肝氣日增肝無血養筋脈拘攣脾氣日困胃陽不振脾失健運濕熱漸生肚口不覺加之飲食非時七情自戕初見症也月事不調肚口作痛嘔吐酸水緑水痰涎身體大腿作酸小腿漸痛臍下或左或右必有或長或圓氣塊作硬拍拍跳動由上而下覺肚中稍寬則疼痛至足脛趺口熱如火烙再則痛至足指指甲縫中痛如針刺日夜喊叫欲生不可欲死不能忽而足痛稍定則肚口依然脹悶甚則面色呈青目睛倒視胸前非重手按捺男子腳跟踹住則昏厥不省人事兩足非婦女替換揉搓不能少定痛楚更有四肢搐搦頭項動搖昏厥僵仆有一二時而蘇或半日而蘇者無論體之強弱但能清餓七日其痛漸定亦有十四朝二十四朝始能漸定者此又在醫之用藥善與不善及病家妄與粥湯吊住邪氣之所致也此說今驗之於病者有略似者而至其治法則亦與男子無異但涉其血分者有宜丹溪心法防己飲者有宜醫學心悟四物湯加減者有宜婦人良方牛膝散者又有顧氏所謂因肝氣鬱結脾氣鬱滯者是當辨別加意而已因抄出良方及顧氏方以備其證云良方牛膝散治腳氣浮腫心神煩悶月候不通川牛膝羚羊角檳榔大黃芒硝防己桂心牡丹皮赤芍藥甘草桃仁上十一味顧氏解鬱湯治婦女腳氣因氣惱恚怒而發者兩脅作脹腿腳痠痛蘇葉廣陳皮半夏當歸鬱金香附白芍遠志肉白茯苓青皮鉤藤鉤上白水煎同鎮風湯治婦女腳氣肝風內鼓搐搦拘攣心中跳動腳腿錐痛面青厥逆橘紅半夏白茯神鉤藤鉤明天麻白芍當歸秦艽棗仁川續斷上白水煎跋右博濟堂腳氣概論刻成或曰是書獨舉一病而不復他及其無嫌於博濟之名乎余曰否奉官准也余嘗周遊乎歐西諸國歐西之人就求治者衆矣其症大抵與和漢之病症無異而腳氣則絶罔見也故歐西醫家亦無有發明焉是以官特創病院以救療斯疾吾黨之士亦體斯旨原古今之良法集諸家之經驗普施博試以著此編者何傷其偏狹乎且夫賀川子玄之於産論池田錦橋之於痘利辨要華岡青洲之於瘍科瑣言皆嘔心鏤骨之所得世以為圭臬顧一握驪珠於腳氣病中則百端疾疢皆為我使用猶正統一歸則九夷八蠻悉受其正朔也或唯唯而退則書以為跋明治十二年五月高島久也祜啓謹識博濟堂記夫堯舜大聖也其德蕩乎巍乎薄海蒼生咸蒙其澤而孔子言其病諸者深贊其能事極功之底於濟衆也今欲以醫之小技體天地之心而成天地之大德其責抑亦大矣今茲明治十一年戊寅秋八月岡田柔克高島祜啓下條貞固清川念祖淺田子誠松山資剛等奉官准創病院於鳳闕之北本兩替坊名曰博濟堂蓋取諸孔子之語云諸君推惟常為長亦今惟常為之記惟常固辭不可乃記曰恤孤養疾之典本屬古制管子曰有痼疾不能自存者官收而衣食之南齊書文惠太子與金陵王子良立疾館以養窮人後魏書宣武詔太常立一館使京畿內外疾者咸令居處便醫治之舊唐書武宗紀廢天下僧寺尋以悲田養病坊僧尼還俗無人主持恐殘疾無以自給乃命兩京量給寺田諸州或七頃或十頃擇本所耆老勾當宋史徽宗紀崇寧九年置安濟坊養民之貧病者仍令諸郡縣給養夷堅志亦云崇寧間設孤老院以養孤老安濟坊以養病人自是周末逮六朝唐宋已著為令甲而未聞有醫人相會以私力救活者也今諸君與有志之徒相議出力捐費創開此館將體天地好生之大德以舉博施普濟之法可謂古今未曾有之義舉矣古昔蘇軾知杭州裒羡緡二千黃金五十兩作病坊以處病者常楙知廣德軍亦置慈幼局諸君抑其流亞耶夫醫之處世不為則已苟為之必濟疾苦施仁術以成一世之軏乃足矣況復創此院以敬其德業嘉惠後人其功於此道果為如何惟常老景頽唐鹿鹿無所為心恆歉焉然幸遭此盛舉深欣仰名賢后先濟美合博濟人民之意故謹稽古典為之記栗園淺田惟常謹識
